<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Create a SoundGuys Account. Unlock personalized recommendations, faster checkouts, and premium order features.">
  <title>Sign Up | SoundGuys AirPods Shop</title>
  
  <!-- CDNs for styling & icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="./index.css">
  <link rel="stylesheet" href="./login.css">
</head>
<body class="auth-body">

  <div class="auth-container glass-panel">
    
    <!-- Left Showcase Panel -->
    <div class="auth-showcase">
      <div class="auth-showcase-bg"></div>
      
      <div class="auth-showcase-content">
        <a href="./home.html" class="auth-logo" id="authLogo">
          <i class="fa-brands fa-apple"></i>
          <span>SoundGuys</span>
        </a>
        <h2 id="showcaseTitle">Join the Magic.</h2>
        <p id="showcaseDesc">Create an account to start configuring your personal audio ecosystem with our signature glassmorphic layout.</p>
      </div>

      <div class="auth-showcase-image" id="showcaseImgContainer">
        <img id="showcaseImage" src="./imge/airpods-pro.webp" alt="AirPods Pro Premium" />
      </div>

      <div class="auth-showcase-footer" id="showcaseFooter">
        &copy; 2026 SoundGuys. Original Apple Clone.
      </div>
    </div>

    <!-- Right Sign Up Panel -->
    <div class="auth-form-panel" id="formPanel">
      <h3 id="formTitle">Create Account</h3>
      <p class="auth-subtitle" id="formSubtitle">Already have an account? <a href="./index.html">Sign In</a></p>
      
      <form id="signupForm" class="auth-form">
        <div class="auth-field">
          <label for="FullName">Full Name</label>
          <div class="auth-input-wrapper">
            <i class="fa-solid fa-user"></i>
            <input type="text" id="FullName" placeholder="John Doe" required />
          </div>
        </div>

        <div class="auth-field">
          <label for="UserName">Email Address</label>
          <div class="auth-input-wrapper">
            <i class="fa-solid fa-envelope"></i>
            <input type="email" id="UserName" placeholder="name@example.com" required />
          </div>
        </div>

        <div class="auth-field">
          <label for="Password">Password</label>
          <div class="auth-input-wrapper">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="Password" placeholder="Minimum 8 characters" required minlength="8" />
          </div>
        </div>

        <div class="auth-field">
          <label for="ConfirmPassword">Confirm Password</label>
          <div class="auth-input-wrapper">
            <i class="fa-solid fa-shield-halved"></i>
            <input type="password" id="ConfirmPassword" placeholder="Repeat your password" required minlength="8" />
          </div>
          <div id="Errormsg" class="error-msg"></div>
        </div>

        <button type="submit" class="btn-auth" id="submitBtn">Sign Up</button>
      </form>
    </div>

  </div>

  <!-- Include GSAP & Validation JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script>
    // GSAP load animations
    window.addEventListener("DOMContentLoaded", () => {
      const tl = gsap.timeline({ defaults: { ease: "power3.out" } });

      tl.from("#authLogo", { duration: 0.8, opacity: 0, y: -20 })
        .from("#showcaseTitle", { duration: 0.6, opacity: 0, x: -30 }, "-=0.4")
        .from("#showcaseDesc", { duration: 0.6, opacity: 0, x: -30 }, "-=0.5")
        .from("#showcaseImage", { duration: 1, opacity: 0, scale: 0.8 }, "-=0.6")
        .from("#formPanel > *", { duration: 0.6, opacity: 0, y: 20, stagger: 0.1 }, "-=0.8");

      // Floating showcase graphic
      gsap.to("#showcaseImage", {
        y: -10,
        duration: 3,
        ease: "sine.inOut",
        yoyo: true,
        repeat: -1
      });

      // Submit listener and validations
      const signupForm = document.getElementById("signupForm");
      if (signupForm) {
        signupForm.addEventListener("submit", function(e) {
          e.preventDefault();
          
          const fullName = document.getElementById("FullName").value.trim();
          const email = document.getElementById("UserName").value.trim();
          const password = document.getElementById("Password").value.trim();
          const confirmPassword = document.getElementById("ConfirmPassword").value.trim();
          const errorMsg = document.getElementById("Errormsg");
          
          errorMsg.textContent = "";

          if (!validateEmail(email)) {
            errorMsg.textContent = "Please enter a valid email address.";
            return;
          }

          if (password.length < 8) {
            errorMsg.textContent = "Password must be at least 8 characters.";
            return;
          }

          if (password !== confirmPassword) {
            errorMsg.textContent = "Passwords do not match.";
            return;
          }

          // Save simulated session
          localStorage.setItem("soundguys_user", JSON.stringify({ email: email, name: fullName, isLoggedIn: true }));

          alert("Account created successfully! Welcome to SoundGuys.");
          window.location.href = "./home.html";
        });
      }
    });

    function validateEmail(email) {
      const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      return re.test(email);
    }
  </script>
</body>
</html>
