<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse our full collection of premium AirPods models.">
  <title>AirPods Catalog — Premium Store</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  
  <header>
    <div class="nav-container">
      <a href="index.html" class="logo">
        <svg class="logo-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C8.13 2 5 5.13 5 9v5.5c0 1.93 1.57 3.5 3.5 3.5H9c.55 0 1-.45 1-1v-4c0-.55-.45-1-1-1H7v-3c0-2.76 2.24-5 5-5s5 2.24 5 5v3h-2c-.55 0-1 .45-1 1v4c0 .55.45 1 1 1h.5c1.93 0 3.5-1.57 3.5-3.5V9c0-3.87-3.13-7-7-7z"/>
        </svg>
        <span>AirPods</span>
      </a>

      <nav class="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="products.html" class="nav-link active">Catalog</a>
        <a href="cart.html" class="nav-link">Cart</a>
      </nav>

      <div class="nav-actions">
        <button class="cart-btn" id="nav-cart-btn" aria-label="Open shopping cart">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/>
          </svg>
          <span class="cart-badge" id="cart-badge-count">0</span>
        </button>
        <button class="menu-toggle" id="mobile-menu-toggle" aria-label="Toggle navigation menu">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main>
    <section class="catalog-section" id="catalog">
      <div class="catalog-header">
        <h2>Choose your sound</h2>
        <div class="filter-chips">
          <button class="filter-chip active" data-category="all">All models</button>
          <button class="filter-chip" data-category="airpods-pro">AirPods Pro</button>
          <button class="filter-chip" data-category="airpods">AirPods</button>
          <button class="filter-chip" data-category="airpods-max">AirPods Max</button>
        </div>
      </div>
      <div class="products-grid" id="products-grid">
        <!-- Products rendered dynamically by products.js and filters.js -->
      </div>
    </section>
  </main>

  <!-- Cart Drawer Overlay -->
  <div class="cart-overlay" id="cart-overlay"></div>

  <!-- Cart Drawer -->
  <aside class="cart-drawer" id="cart-drawer">
    <div class="cart-header">
      <h3>Your bag</h3>
      <button class="close-cart-btn" id="close-cart-btn" aria-label="Close cart drawer">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
        </svg>
      </button>
    </div>
    
    <div class="cart-items-container" id="cart-items-container">
      <div class="cart-empty-message">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/>
        </svg>
        <p>Your shopping bag is empty</p>
      </div>
    </div>

    <div class="cart-footer">
      <div class="cart-subtotal-row">
        <span class="cart-subtotal-label">Subtotal</span>
        <span class="cart-subtotal-val" id="cart-subtotal-val">$0.00</span>
      </div>
      <button class="btn btn-accent checkout-btn" id="cart-checkout-btn">Checkout</button>
    </div>
  </aside>

  <!-- Toast Notification Container -->
  <div id="toast-container"></div>

  <!-- Footer -->
  <footer>
    <div class="footer-container">
      <p>&copy; 2026 AirPods Premium Store. Built with clean, flat guidelines.</p>
    </div>
  </footer>

  <script src="js/cart.js"></script>
  <script src="js/products.js"></script>
  <script src="js/filters.js"></script>
</body>
</html>
