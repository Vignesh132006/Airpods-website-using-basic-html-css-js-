<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | SoundGuys AirPods Shop</title>
  <link rel="stylesheet" href="./login.css">
</head>

<body>
  <div class="container">

    <div class="welcome">
      <h1>Welcome!</h1>
      <h2 class="shop">SoundGuys AirPods Shop</h2>
      <hr style="margin: 20px 0;">
      <p>
        AirPods Pro have been designed to deliver Active Noise Cancellation for immersive sound, Transparency mode so
        you can hear your surroundings, and a customizable fit for all-day comfort.
      </p>
      <button onclick="alert('More features coming soon!')">Learn More</button>
    </div>

    <div class="signin" >
      <h2>Sign In</h2>
      <form action="./index.html" id="sign">
        <label for="email"></label>
        <input type="email" id="UserName" name="email" placeholder="Enter your Email ID" required/>
        <label for="password"></label>
        <input type="password" id="Password" placeholder="Enter your password" required minlength="8"/>
        <div id="Errormsg"></div>

       <button type="submit">Submit</button>
      </form>
      
      <p>Don't have an account? <a href="signup.html">Sign up</a></p>
    </div>
  </div>
  <script src="./login.js"></script>

</body>

</html>
