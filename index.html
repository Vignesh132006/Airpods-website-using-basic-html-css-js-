<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Sign in to your SoundGuys Account. Connect and access your personalized cart items and order histories.">
  <title>Login | SoundGuys AirPods Shop</title>
  
  <!-- CDNs for styling & icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="./index.css">
  <link rel="stylesheet" href="./login.css">
</head>
<body class="auth-body">

  <div class="auth-container glass-panel">
    
    <!-- Left Showcase Panel -->
    <div class="auth-showcase">
      <div class="auth-showcase-bg"></div>
      
      <div class="auth-showcase-content">
        <a href="./home.html" class="auth-logo" id="authLogo">
          <i class="fa-brands fa-apple"></i>
          <span>SoundGuys</span>
        </a>
        <h2 id="showcaseTitle">Sound. Redefined.</h2>
        <p id="showcaseDesc">Sign in to check out, track orders, and experience high-fidelity acoustics personalized just for you.</p>
      </div>

      <div class="auth-showcase-image" id="showcaseImgContainer">
        <img id="showcaseImage" src="./imge/AirPods-Max-2.webp" alt="AirPods Max Premium" />
      </div>

      <div class="auth-showcase-footer" id="showcaseFooter">
        &copy; 2026 SoundGuys. Original Apple Clone.
      </div>
    </div>

    <!-- Right Sign In Panel -->
    <div class="auth-form-panel" id="formPanel">
      <h3 id="formTitle">Sign In</h3>
      <p class="auth-subtitle" id="formSubtitle">New to SoundGuys? <a href="./signup.html">Create an account</a></p>
      
      <form id="sign" class="auth-form">
        <div class="auth-field">
          <label for="UserName">Email Address</label>
          <div class="auth-input-wrapper">
            <i class="fa-solid fa-envelope"></i>
            <input type="email" id="UserName" name="email" placeholder="name@example.com" required />
          </div>
        </div>

        <div class="auth-field">
          <label for="Password">Password</label>
          <div class="auth-input-wrapper">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="Password" placeholder="Minimum 8 characters" required minlength="8" />
          </div>
          <div id="Errormsg" class="error-msg"></div>
        </div>

        <button type="submit" class="btn-auth" id="submitBtn">Sign In</button>
      </form>
    </div>

  </div>

  <!-- Include GSAP & Login JS Validation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="./login.js"></script>
  <script>
    // GSAP load animations
    window.addEventListener("DOMContentLoaded", () => {
      const tl = gsap.timeline({ defaults: { ease: "power3.out" } });

      tl.from("#authLogo", { duration: 0.8, opacity: 0, y: -20 })
        .from("#showcaseTitle", { duration: 0.6, opacity: 0, x: -30 }, "-=0.4")
        .from("#showcaseDesc", { duration: 0.6, opacity: 0, x: -30 }, "-=0.5")
        .from("#showcaseImage", { duration: 1, opacity: 0, scale: 0.8 }, "-=0.6")
        .from("#formPanel > *", { duration: 0.6, opacity: 0, y: 20, stagger: 0.1 }, "-=0.8");

      // Floating showcase graphic
      gsap.to("#showcaseImage", {
        y: -10,
        duration: 3,
        ease: "sine.inOut",
        yoyo: true,
        repeat: -1
      });
    });
  </script>
</body>
</html>
